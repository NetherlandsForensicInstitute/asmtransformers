name: citatio

on:
  push:
    branches: ['main']
    paths: ['asmtransformers/**', 'citatio/**']
  pull_request:
    paths: ['asmtransformers/**', 'citatio/**']

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: citatio/
    steps:
      - uses: actions/checkout@v6
      - uses: pdm-project/setup-pdm@v4
        with:
          python-version: '3.13'
          cache: true
          cache-dependency-path: 'citatio/pdm.lock'
      - run: pdm install --group check --no-default
      - run: pdm run check
  test:
    runs-on: ubuntu-latest
    needs: check
    strategy:
      matrix:
        python-version: ['3.13']
    defaults:
      run:
        working-directory: citatio/
    steps:
      - uses: actions/checkout@v6
      - uses: pdm-project/setup-pdm@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: true
          cache-dependency-path: 'citatio/pdm.lock'
      - run: pdm install --group test
      - run: pdm run test
